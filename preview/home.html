<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@geolonia/geolonia-maps-draw - Demos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #666;
      margin-bottom: 2rem;
    }
    .demos {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .demo-card {
      display: block;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .demo-card:hover,
    .demo-card:focus-visible {
      border-color: #3b82f6;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.15);
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }
    .demo-card h2 {
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }
    .demo-card span {
      font-size: 0.875rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>@geolonia/geolonia-maps-draw</h1>
    <p>Geolonia Maps 専用の GeoJSON 描画モジュール</p>
    <div class="demos">
      <a class="demo-card" href="./react.html">
        <h2>React Demo</h2>
        <span>React hooks + コンポーネント</span>
      </a>
      <a class="demo-card" href="./html-sample.html">
        <h2>HTML Sample</h2>
        <span>HTML + script タグで利用するサンプル（ソースコード閲覧可）</span>
      </a>
    </div>
  </div>
</body>
</html>
