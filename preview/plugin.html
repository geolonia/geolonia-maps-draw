<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Engine - Embed Plugin Demo</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <!--
    Geolonia Embed Plugin を使ったデモ。
    data-draw="on" を指定するだけで描画機能が有効になります。
  -->
  <div
    class="geolonia"
    data-draw="on"
    data-style="geolonia/basic-v1"
    style="width: 100%; height: 100vh;"
  ></div>

  <script src="https://cdn.geolonia.com/v1/embed?geolonia-api-key=%VITE_GEOLONIA_API_KEY%"></script>
  <script type="module">
    import '../src/plugin/index.ts'
  </script>
</body>
</html>
